name: vibe_cafe
description: "Enterprise-grade cafe and restaurant ordering platform with AI recommendations, real-time tracking, and multi-payment support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.6.5
  get_storage: ^2.1.1
  
  # Functional Programming
  dartz: ^0.10.1
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Networking & API
  dio: ^5.3.1
  retrofit: ^4.0.1
  pretty_dio_logger: ^1.3.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Authentication & Security
  google_sign_in: ^6.1.4
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  flutter_secure_storage: ^9.2.4

  # Database
  firebase_database: ^11.0.2
  cloud_firestore: ^5.0.1
  
  # Payment & Razorpay
  razorpay_flutter: ^1.3.8
  flutter_stripe: ^10.1.1
  
  # Image Handling & Caching
  cached_network_image: ^3.3.0
  image: ^4.1.3
  
  # Date & Time
  intl: ^0.20.2
  table_calendar: ^3.0.9
  
  # Validation
  email_validator: ^2.1.17
  
  # Logging & Monitoring
  logger: ^2.0.1
  firebase_crashlytics: ^4.0.1
  sentry_flutter: ^7.8.0
  
  # QR Code
  qr_flutter: ^4.0.0
  qr_code_scanner: ^1.0.1
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.1
  geocoding: ^2.1.1
  
  # Push Notifications
  firebase_messaging: ^15.0.1
  
  # PDF & Document Generation
  pdf: ^3.10.4
  
  # Socket (Real-time updates)
  socket_io_client: ^2.0.2
  
  # Localization
  flutter_localization: ^0.1.14

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Code Quality
  flutter_lints: ^3.0.0
  very_good_analysis: ^5.1.0
  
  # Testing
  mockito: ^5.4.2
  integration_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.6
  hive_generator: ^2.0.0
  retrofit_generator: ^7.0.1
  json_serializable: ^6.7.1
  
  # Development Tools
  freezed: ^2.4.1
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
